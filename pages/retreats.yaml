metadata:
  title: Retreats
  description: >-
    Experience personalized healing at AyaSelva Healing Center in the Peruvian Amazon. We offer 12-day and 7-day retreats
    with ayahuasca ceremonies, jungle walks, and meditation. Limited to 8 guests for individual attention.
hero:
  tagline: What to expect
  title: What to expect
sections:
  - id: Retreat
    columns: 3
    isReversed: true
    bgBlue: true
    image:
      src: https://image.ayaselva.com/page/retreat/001-smoke.jpg
      alt: Colorful Image
    html: |
      <p><strong>Retreat options</strong><br>
        We offer a 12-day program and a 7-day program for people with less time available. The 12-day program consists
        of 7 ayahuasca ceremonies, whereas the 7-day option has 4 ceremonies. During the retreat, both individual and group
        meetings will be held to provide guidance to our guests. After every ceremony, there will be a sharing circle where
        we go over the experience. The curandero will share his insights gathered during the ceremonies and provide practical
        suggestions for our guests.<br>
        Apart from the ayahuasca ceremonies, you can expect jungle walks, flower baths, meditation sessions, an introduction
        to rapé medicine, a fire ceremony, learning to cook ayahuasca, along with other activities.</p>
      <br />
      <p><strong>Experience Personalized Healing</strong><br>
        Our ayahuasca center offers an intimate and personalized experience with a limited guest capacity of 8 people.
        This ensures that each participant receives individual attention and a more meaningful journey in a serene and
        supportive environment.</p>
  - id: about
    columns: 3
    bgBlue: true
    image:
      src: https://image.ayaselva.com/page/retreat/002-amazon_river.jpg
      alt: Colorful Image
    html: |
      <p><strong>Upon arrival</strong><br>
        Since traveling all the way to Peru is taxing as it is, we will pick you up at Iquitos airport and bring you to either
        a comfortable hotel or to our center in Tamshiyacu, depending on your flight schedule. Our aim is to let our guests feel
        comfortable and welcomed. We will have a brief meeting in Iquitos where we will go over some practical details before we
        travel by boat to Tamshiyacu. By motokar, we will drive to the center where you can settle down. After lunch, we will have
        an introduction meeting where the program will be explained in detail. Ayaselva is located in the middle of the jungle but
        close enough to the town for any potential emergency.</p>
      <br />
  - id: about
    columns: 3
    isReversed: true
    bgBlue: true
    image:
      src: https://image.ayaselva.com/page/retreat/003-room.jpg
      alt: Colorful Image
    html: |
      <p><strong>Accommodation</strong><br>
        You will be sleeping in a spacious private room equipped with electricity for charging electronic devices.</p>
      <br />
      <p><strong>Electronics and Internet</strong><br>
        We encourage our guests to limit the use of electronic devices. Excessive use can hinder people from making meaningful
        connections with others. By reducing screen time, we foster a more engaging and interactive environment, allowing guests to
        fully experience and enjoy their surroundings and interactions. We do, however, offer fast internet since we understand the
        importance of staying connected. Guests are welcome to use the internet for essential activities such as video calling,
        keeping in touch with family and friends, or necessary work tasks. We strive to balance connectivity with a mindful approach
        to technology use.</p>
      <br />
  - id: Retreat
    columns: 3
    bgBlue: true
    image:
      src: https://image.ayaselva.com/page/retreat/004-food.jpg
      alt: Colorful Image
    html: |
      <p><strong>Food</strong><br>
        On ceremony days, 2 meals, and on non-ceremony days, 3 meals will be served. The meals will be catered to the preferences
        of our guests, though our chef adheres to specific standards concerning ayahuasca.</p>
      <br />
      <p>
        Ayaselva is a safe place where you can feel at home. We want you to feel at ease here and place your trust in the sacred
        plants and the maestro. Together, we can help each other with our love and compassion.
      </p>
