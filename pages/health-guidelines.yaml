body: |
  ## Medication

  For your safety and to ensure the best possible experience during your ayahuasca ceremony, it is essential to follow our medication guidelines:

  ### SSRI Medications

  Participants must not be taking any Selective Serotonin Reuptake Inhibitors (SSRIs) at least 6 weeks before arrival. SSRIs can interact dangerously with ayahuasca, leading to potentially severe health risks.

  ### MAOI Medications

  Monoamine Oxidase Inhibitors (MAOIs) are also prohibited. MAOIs combined with ayahuasca can cause life-threatening side effects, including hypertensive crises.

  ### Antipsychotic Medications

  Antipsychotic medications must be discontinued at least 6 weeks before your arrival. These medications can alter the effects of ayahuasca and pose significant health risks.

  If you are currently taking any of the above medications, it is crucial to taper off them gradually under the supervision of a medical professional. Abruptly stopping medication can lead to withdrawal symptoms and other health complications.

  ## Health considerations

  While ayahuasca has been used for centuries for spiritual and healing purposes, it is important to understand that it may not be suitable for everyone, especially those with certain medical conditions. People with the following diseases cannot participate in ayahuasca ceremonies at Ayaselva:

  - Schizophrenia
  - Cardiovascular disease
  - Epilepsy

  ## Recreational drugs

  Recreational drugs are not allowed at Ayaselva.

  ## Preparation upon arrival

  To ensure a safe and transformative experience, we require participants to follow specific preparation guidelines:

  ### Dietary Restrictions

  - Avoid certain foods: For at least one week prior to the ceremony, avoid red meat, pork, spicy foods, and overly processed foods. Stick to a diet rich in fruits, vegetables, and whole grains.
  - Abstain from alcohol and drugs: Refrain from consuming alcohol and recreational drugs for at least two weeks before arrival.
  - Limit caffeine intake: Reduce or eliminate caffeine consumption to help purify your system.

  ### Sexual Activity

  Abstain from sexual activity: It is recommended to avoid sexual activity, including masturbation, for at least a week before and after arrival. This helps conserve your body's energy and maintain spiritual focus.

  ### Mental and Emotional Preparation

  - Set intentions: Spend time reflecting on your intentions for attending our retreat center. Meditate, journal, or engage in other practices that help you focus on your goals.
  - Emotional stability: Ensure you are in a stable emotional state before participating. If you are experiencing extreme emotional distress, it may not be the right time for an ayahuasca retreat.
